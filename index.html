<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うちの子、なに色？🐰 うさぎカラー診断</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap');

  :root {
    --cream: #FDF6EE;
    --soft-pink: #F2C4CE;
    --dusty-rose: #E8A0B0;
    --warm-brown: #C4856A;
    --sage: #A8C4A2;
    --lavender: #C4B8D8;
    --text: #4A3728;
    --text-light: #8C6D5E;
    --card-bg: #FFFBF7;
    --shadow: rgba(196, 133, 106, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ヘッダー */
  .header {
    background: linear-gradient(135deg, #F9E8EE 0%, #EEE6F5 50%, #E8F2EA 100%);
    padding: 36px 20px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: rgba(242, 196, 206, 0.3);
    border-radius: 50%;
  }
  .header-emoji { font-size: 52px; margin-bottom: 8px; display: flex; justify-content: center; }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.4;
  }
  .header p {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-light);
  }

  /* プログレスバー */
  .progress-wrap {
    max-width: 480px;
    margin: 20px auto 0;
    padding: 0 20px;
  }
  .progress-label {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 6px;
    text-align: right;
  }
  .progress-bar {
    height: 6px;
    background: rgba(196,133,106,0.15);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--dusty-rose), var(--lavender));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* メインカード */
  .card-wrap {
    max-width: 480px;
    margin: 20px auto 0;
    padding: 0 16px;
  }

  .question-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 4px 20px var(--shadow);
  }

  .step-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--soft-pink), var(--lavender));
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 14px;
    letter-spacing: 0.06em;
  }

  .question-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 6px;
  }

  .question-sub {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 20px;
  }

  /* 選択肢 */
  .options-grid {
    display: grid;
    gap: 10px;
  }
  .options-grid.col2 { grid-template-columns: 1fr 1fr; }
  .options-grid.col1 { grid-template-columns: 1fr; }

  .option-btn {
    background: white;
    border: 2px solid rgba(196,133,106,0.15);
    border-radius: 14px;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: center;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .option-btn:hover {
    border-color: var(--dusty-rose);
    background: #FFF5F7;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(232,160,176,0.2);
  }
  .option-btn.selected {
    border-color: var(--dusty-rose);
    background: linear-gradient(135deg, #FFF0F3, #F5F0FF);
    color: var(--text);
  }
  .option-emoji { display: block; font-size: 24px; margin-bottom: 4px; }
  .option-label { display: block; font-size: 13px; }
  .option-sub { display: block; font-size: 11px; color: var(--text-light); margin-top: 2px; }

  /* 品種イラスト用 */
  .breed-btn { padding: 12px 8px 10px; }
  .breed-illust {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
  }
  .breed-illust svg {
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08));
    transition: transform 0.2s ease;
  }
  .breed-btn:hover .breed-illust svg { transform: scale(1.08) translateY(-2px); }
  .breed-btn.selected .breed-illust svg { transform: scale(1.1); }

  /* ホバー・選択時にニコニコ顔へ切り替え */
  .breed-btn .face-normal { opacity: 1; }
  .breed-btn .face-smile  { opacity: 0; }
  .breed-btn:hover .face-normal,
  .breed-btn.selected .face-normal { opacity: 0; }
  .breed-btn:hover .face-smile,
  .breed-btn.selected .face-smile  { opacity: 1; }

  /* 性格チェックボックス */
  .personality-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .personality-chip {
    background: white;
    border: 2px solid rgba(196,133,106,0.15);
    border-radius: 99px;
    padding: 10px 14px;
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s ease;
  }
  .personality-chip:hover {
    border-color: var(--sage);
    background: #F5FBF5;
  }
  .personality-chip.selected {
    border-color: var(--sage);
    background: linear-gradient(135deg, #F0FBF0, #F5F5FF);
    font-weight: 700;
  }
  .personality-chip .chip-emoji { font-size: 16px; }

  /* 次へボタン */
  .next-btn {
    display: block;
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: linear-gradient(135deg, var(--dusty-rose), var(--lavender));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s ease;
    box-shadow: 0 4px 14px rgba(232,160,176,0.4);
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(232,160,176,0.5); }
  .next-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* 結果カード */
  .result-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 32px 24px;
    box-shadow: 0 4px 20px var(--shadow);
    text-align: center;
  }

  .result-color-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin: 0 auto 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .result-color-name {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .result-color-name-en {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 18px;
    letter-spacing: 0.08em;
  }

  .result-section {
    background: white;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 12px;
    text-align: left;
  }
  .result-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-light);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .result-section p { font-size: 14px; line-height: 1.7; }

  .compat-colors {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .compat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--cream);
    border-radius: 99px;
    padding: 6px 12px;
    font-size: 13px;
  }
  .compat-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .retry-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: transparent;
    color: var(--text-light);
    border: 2px solid rgba(196,133,106,0.2);
    border-radius: 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .retry-btn:hover { border-color: var(--dusty-rose); color: var(--text); }

  .share-hint {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 16px;
    text-align: center;
  }

  /* アニメーション */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.3s ease both; }

  @keyframes pop {
    0%   { transform: scale(0.8); opacity: 0; }
    60%  { transform: scale(1.06); }
    100% { transform: scale(1); opacity: 1; }
  }
  .pop { animation: pop 0.45s ease both; }

  /* うさぎ装飾 */
  .bunny-deco {
    font-size: 20px;
    opacity: 0.35;
    position: absolute;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-emoji">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" width="88" height="88">
      <!-- 立ち耳（左） -->
      <ellipse cx="30" cy="22" rx="11" ry="26" fill="#F0ECEC"/>
      <ellipse cx="30" cy="22" rx="6.5" ry="20" fill="#F4C0C8" opacity="0.85"/>
      <!-- 立ち耳（右） -->
      <ellipse cx="70" cy="22" rx="11" ry="26" fill="#F0ECEC"/>
      <ellipse cx="70" cy="22" rx="6.5" ry="20" fill="#F4C0C8" opacity="0.85"/>
      <!-- 顔 -->
      <circle cx="50" cy="66" r="34" fill="#F8F6F4"/>
      <!-- 目（左） -->
      <ellipse cx="38" cy="62" rx="5.5" ry="6" fill="white"/>
      <circle cx="39" cy="63.5" r="3.5" fill="#2C2018"/>
      <circle cx="40.5" cy="62" r="1.4" fill="white"/>
      <!-- 目（右） -->
      <ellipse cx="62" cy="62" rx="5.5" ry="6" fill="white"/>
      <circle cx="63" cy="63.5" r="3.5" fill="#2C2018"/>
      <circle cx="64.5" cy="62" r="1.4" fill="white"/>
      <!-- 鼻 -->
      <ellipse cx="50" cy="72" rx="3.5" ry="2.5" fill="#E8A0B0"/>
      <!-- 口 -->
      <path d="M46 74.5 Q50 79 54 74.5" stroke="#C47090" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <!-- ほっぺ -->
      <circle cx="36" cy="70" r="5" fill="#F4B0C0" opacity="0.35"/>
      <circle cx="64" cy="70" r="5" fill="#F4B0C0" opacity="0.35"/>
      <!-- ひげ -->
      <line x1="18" y1="70" x2="42" y2="72" stroke="#C4A88C" stroke-width="1" opacity="0.5"/>
      <line x1="18" y1="74" x2="42" y2="73.5" stroke="#C4A88C" stroke-width="1" opacity="0.5"/>
      <line x1="58" y1="72" x2="82" y2="70" stroke="#C4A88C" stroke-width="1" opacity="0.5"/>
      <line x1="58" y1="73.5" x2="82" y2="74" stroke="#C4A88C" stroke-width="1" opacity="0.5"/>
    </svg>
  </span>
  <h1>うちの子、なに色？<br>うさぎカラー診断</h1>
  <p>品種・毛色・性格から、あなたのうさぎの「パーソナルカラー」を診断！</p>
</div>

<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-label" id="progressLabel"></div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<div class="card-wrap" id="appRoot"></div>

<script>
// ===== データ定義 =====

const BREEDS = [
  { id:'holland_lop',       label:'ホーランドロップ',       sub:'垂れ耳・まんまる' },
  { id:'netherlands_dwarf', label:'ネザーランドドワーフ',   sub:'小さな立ち耳' },
  { id:'mini_rex',          label:'ミニレッキス',           sub:'ビロード毛・立ち耳' },
  { id:'angora',            label:'アンゴラ',               sub:'ふわふわロング毛' },
  { id:'lion_head',         label:'ライオンヘッド',         sub:'たてがみ風の毛' },
  { id:'french_lop',        label:'フレンチロップ',         sub:'大型・垂れ耳' },
  { id:'mini_lop',          label:'ミニロップ',             sub:'中型・垂れ耳' },
  { id:'flemish',           label:'フレミッシュジャイアント', sub:'超大型種' },
  { id:'rex',               label:'レッキス',               sub:'短くなめらかな毛' },
  { id:'dwarf_hotot',       label:'ドワーフホトット',       sub:'目の周りのライン' },
  { id:'english_spot',      label:'イングリッシュスポット', sub:'模様が特徴的' },
  { id:'polish',            label:'ポーランド',             sub:'小型・コンパクト' },
  { id:'jersey_wooly',      label:'ジャージーウーリー',     sub:'小型・ふわもふ毛' },
  { id:'other_small',       label:'その他の小型種',         sub:'小さくてかわいい子' },
  { id:'mixed',             label:'ミックス（雑種）',       sub:'いいとこどり！' },
];

// ===== 品種SVGイラスト =====
// 通常顔パーツ
const FACE_NORMAL = `
  <ellipse cx="32" cy="43" rx="4" ry="4.5" fill="white"/>
  <ellipse cx="48" cy="43" rx="4" ry="4.5" fill="white"/>
  <circle cx="33" cy="44" r="2.5" fill="#3A2820"/>
  <circle cx="49" cy="44" r="2.5" fill="#3A2820"/>
  <circle cx="34" cy="43" r="1" fill="white"/>
  <circle cx="50" cy="43" r="1" fill="white"/>
  <ellipse cx="40" cy="50.5" rx="2.4" ry="1.7" fill="#E8A0B0"/>
  <path d="M37.5 52.5 Q40 55.5 42.5 52.5" stroke="#C47090" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <line x1="20" y1="50" x2="34" y2="51" stroke="#C4A88C" stroke-width="0.8" opacity="0.55"/>
  <line x1="20" y1="53" x2="34" y2="52.5" stroke="#C4A88C" stroke-width="0.8" opacity="0.55"/>
  <line x1="46" y1="51" x2="60" y2="50" stroke="#C4A88C" stroke-width="0.8" opacity="0.55"/>
  <line x1="46" y1="52.5" x2="60" y2="53" stroke="#C4A88C" stroke-width="0.8" opacity="0.55"/>`;

// ニコニコ顔パーツ（ホバー時）
const FACE_SMILE = `
  <path d="M28 43 Q32 39 36 43" stroke="#3A2820" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M44 43 Q48 39 52 43" stroke="#3A2820" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="40" cy="50.5" rx="2.4" ry="1.7" fill="#E8A0B0"/>
  <path d="M36 52 Q40 57 44 52" stroke="#C47090" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="29" cy="47" r="3" fill="#F0A0B0" opacity="0.45"/>
  <circle cx="51" cy="47" r="3" fill="#F0A0B0" opacity="0.45"/>
  <line x1="20" y1="50" x2="34" y2="51" stroke="#C4A88C" stroke-width="0.8" opacity="0.55"/>
  <line x1="20" y1="53" x2="34" y2="52.5" stroke="#C4A88C" stroke-width="0.8" opacity="0.55"/>
  <line x1="46" y1="51" x2="60" y2="50" stroke="#C4A88C" stroke-width="0.8" opacity="0.55"/>
  <line x1="46" y1="52.5" x2="60" y2="53" stroke="#C4A88C" stroke-width="0.8" opacity="0.55"/>`;

// SVGビルダー：通常顔とスマイル顔を両方埋め込み、CSSで切り替え
function makeSVG({ bg='#F9F0E8', earsBefore='', earsAfter='', bodyExtras='', faceExtras='' } = {}) {
  const id = 'svg_' + Math.random().toString(36).slice(2,7);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="64" height="64" class="bunny-svg">
    ${earsBefore}
    <circle cx="40" cy="44" r="26" fill="${bg}"/>
    ${earsAfter}
    ${bodyExtras}
    <g class="face-normal">${FACE_NORMAL}${faceExtras}</g>
    <g class="face-smile">${FACE_SMILE}${faceExtras}</g>
  </svg>`;
}

// 垂れ耳：外向きに広がる（左は左へ、右は右へ傾く）
function flopEars(col='#F0D0C0', inner='#F2B0C0') {
  return {
    before: `
      <ellipse cx="18" cy="48" rx="10" ry="20" fill="${col}" transform="rotate(18,18,48)"/>
      <ellipse cx="18" cy="48" rx="6"  ry="14" fill="${inner}" transform="rotate(18,18,48)" opacity="0.75"/>
      <ellipse cx="62" cy="48" rx="10" ry="20" fill="${col}" transform="rotate(-18,62,48)"/>
      <ellipse cx="62" cy="48" rx="6"  ry="14" fill="${inner}" transform="rotate(-18,62,48)" opacity="0.75"/>`,
    after: ''
  };
}
// フレンチロップ用：特大垂れ耳・さらに外向き
function bigFlopEars(col='#EDD0C0', inner='#F0A8BC') {
  return {
    before: `
      <ellipse cx="14" cy="52" rx="12" ry="24" fill="${col}" transform="rotate(22,14,52)"/>
      <ellipse cx="14" cy="52" rx="7"  ry="17" fill="${inner}" transform="rotate(22,14,52)" opacity="0.75"/>
      <ellipse cx="66" cy="52" rx="12" ry="24" fill="${col}" transform="rotate(-22,66,52)"/>
      <ellipse cx="66" cy="52" rx="7"  ry="17" fill="${inner}" transform="rotate(-22,66,52)" opacity="0.75"/>`,
    after: ''
  };
}
// 立ち耳（小）
function smallEars(col='#F0D0C0', inner='#F2B0C0') {
  return {
    before: `
      <ellipse cx="27" cy="18" rx="7" ry="13" fill="${col}"/>
      <ellipse cx="27" cy="18" rx="4" ry="9"  fill="${inner}" opacity="0.75"/>
      <ellipse cx="53" cy="18" rx="7" ry="13" fill="${col}"/>
      <ellipse cx="53" cy="18" rx="4" ry="9"  fill="${inner}" opacity="0.75"/>`,
    after: ''
  };
}
// 立ち耳（大・細長）
function tallEars(col='#F0D0C0', inner='#F2B0C0') {
  return {
    before: `
      <ellipse cx="26" cy="13" rx="7" ry="16" fill="${col}"/>
      <ellipse cx="26" cy="13" rx="4" ry="11" fill="${inner}" opacity="0.75"/>
      <ellipse cx="54" cy="13" rx="7" ry="16" fill="${col}"/>
      <ellipse cx="54" cy="13" rx="4" ry="11" fill="${inner}" opacity="0.75"/>`,
    after: ''
  };
}

const BREED_SVG = {
  // ホーランドロップ
  holland_lop: () => {
    const e = flopEars('#EDD0C0','#F0A8BC');
    return makeSVG({ bg:'#FBF0E8', earsBefore: e.before });
  },
  // ネザーランドドワーフ：小さい立ち耳・ぷちっとした顔
  netherlands_dwarf: () => {
    const e = smallEars('#E8C8B8','#F0A0B8');
    return makeSVG({ bg:'#F8EEE8', earsBefore: e.before,
      bodyExtras: `<circle cx="40" cy="44" r="22" fill="#F8EEE8"/>` });
  },
  // ミニレッキス：ツヤ感
  mini_rex: () => {
    const e = smallEars('#C8A898','#E09080');
    return makeSVG({ bg:'#EAD8CE', earsBefore: e.before,
      bodyExtras: `<ellipse cx="34" cy="38" rx="6" ry="5" fill="white" opacity="0.2"/>` });
  },
  // アンゴラ：もふもふ輪郭
  angora: () => {
    const e = tallEars('#EEE8F0','#F0C0D0');
    const fluff = Array.from({length:18}, (_,i) => {
      const a=(i/18)*Math.PI*2, r=27+Math.sin(i*2.3)*3;
      const x=(40+r*Math.cos(a)).toFixed(1), y=(44+r*Math.sin(a)*0.85).toFixed(1);
      const rr=(2.8+Math.sin(i)*0.9).toFixed(1);
      return `<circle cx="${x}" cy="${y}" r="${rr}" fill="#F0ECF4" opacity="0.88"/>`;
    }).join('');
    return makeSVG({ bg:'#F4F0F8', earsBefore: e.before, bodyExtras: fluff });
  },
  // ライオンヘッド：立派なたてがみ＋丸い小耳
  lion_head: () => {
    // たてがみ：中心から放射状の毛束ストローク
    const cx=40, cy=45;
    const strokes = Array.from({length:28}, (_,i) => {
      const a = (i/28)*Math.PI*2;
      const r0 = 20, r1 = 34 + Math.sin(i*2.3)*4;
      const x0=(cx+r0*Math.cos(a)).toFixed(1), y0=(cy+r0*Math.sin(a)*0.9).toFixed(1);
      const x1=(cx+r1*Math.cos(a)).toFixed(1), y1=(cy+r1*Math.sin(a)*0.9).toFixed(1);

// ===== アプリ状態 =====
let state = {
  step: 0,
  breed: null,
  coat: null,
  gender: null,
  personalities: [],
};

const STEPS = ['breed','coat','gender','personality','result'];

// ===== ユーティリティ =====
function getResult() {
  const coatKey = state.coat;
  const colorTable = COLOR_RESULTS[coatKey];
  if (!colorTable) return COLOR_RESULTS['chestnut'].base;

  // 性格から最初にマッチしたものを優先
  for (const p of state.personalities) {
    if (colorTable[p]) return colorTable[p];
  }
  return colorTable.base;
}

function updateProgress() {
  const wrap = document.getElementById('progressWrap');
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  const idx = STEPS.indexOf(state.step === 'result' ? 'result' : STEPS[state.step]);
  const pct = state.step === 'result' ? 100 : Math.round((state.step / (STEPS.length - 1)) * 100);
  wrap.style.display = 'block';
  fill.style.width = pct + '%';
  label.textContent = state.step === 'result' ? '診断完了！' : `STEP ${state.step + 1} / ${STEPS.length - 1}`;
}

// ===== レンダリング =====
function render() {
  const root = document.getElementById('appRoot');
  updateProgress();

  if (state.step === 0) renderBreed(root);
  else if (state.step === 1) renderCoat(root);
  else if (state.step === 2) renderGender(root);
  else if (state.step === 3) renderPersonality(root);
  else renderResult(root);
}

      <span class="step-badge">STEP 3 · 性別</span>
      <div class="question-title">男の子？女の子？</div>
      <div class="question-sub">どちらに近いですか</div>
      <div class="options-grid col2" id="genderGrid"></div>
      <button class="next-btn" id="nextBtn" disabled onclick="nextStep()">つぎへ →</button>
    </div>`;
  const grid = document.getElementById('genderGrid');
  GENDERS.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-emoji">${g.emoji}</span><span class="option-label">${g.label}</span><span class="option-sub">${g.sub}</span>`;
    btn.onclick = () => {
      document.querySelectorAll('#genderGrid .option-btn').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      state.gender = g.id;
      document.getElementById('nextBtn').disabled = false;
    };
    grid.appendChild(btn);
  });
}

function renderPersonality(root) {
  root.innerHTML = `
    <div class="question-card fade-up">
      <span class="step-badge">STEP 4 · 性格</span>
      <div class="question-title">どんな子？✨</div>
      <div class="question-sub">あてはまるものをいくつでも選んでください（1つ以上）</div>
      <div class="personality-grid" id="personalityGrid"></div>
      <button class="next-btn" id="nextBtn" disabled onclick="nextStep()">診断する 🔮</button>
    </div>`;
  const grid = document.getElementById('personalityGrid');
  PERSONALITIES.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'personality-chip';
    btn.innerHTML = `<span class="chip-emoji">${p.emoji}</span>${p.label}`;
    btn.onclick = () => {
      const idx = state.personalities.indexOf(p.id);
      if (idx === -1) { state.personalities.push(p.id); btn.classList.add('selected'); }
      else { state.personalities.splice(idx, 1); btn.classList.remove('selected'); }
      document.getElementById('nextBtn').disabled = state.personalities.length === 0;
    };
    grid.appendChild(btn);
  });
}

function renderResult(root) {
  const result = getResult();
  const compat = COMPAT_MAP[state.coat] || COMPAT_MAP['chestnut'];
  const msg = COLOR_MESSAGES[state.coat] || COLOR_MESSAGES['chestnut'];
  const breedLabel = BREEDS.find(b => b.id === state.breed)?.label || '';
  const coatLabel = COAT_COLORS.find(c => c.id === state.coat)?.label || '';
  const genderLabel = state.gender === 'female' ? '女の子' : '男の子';

  document.getElementById('progressLabel').textContent = '診断完了！';

  root.innerHTML = `
    <div class="result-card pop">
      <div style="font-size:12px;color:var(--text-light);margin-bottom:16px">${breedLabel} · ${coatLabel} · ${genderLabel}</div>
      
      <div class="result-color-circle" style="background:${result.hex}">${result.emoji}</div>
      <div class="result-color-name">${result.name}</div>
      <div class="result-color-name-en">${result.nameEn}</div>

      <div class="result-section">
        <div class="result-section-title">✦ カラーイメージ</div>
        <p>${msg}</p>
      </div>

      <div class="result-section">
        <div class="result-section-title">✦ 相性のいい色</div>
        <div class="compat-colors">
          ${compat.map(c => `
            <div class="compat-chip">
              <span class="compat-dot" style="background:${c.hex}"></span>
              ${c.name}
            </div>
          `).join('')}
        </div>
      </div>

      <div class="result-section">
        <div class="result-section-title">✦ インテリアヒント</div>
        <p>ケージまわりや遊び空間に<strong>${compat[0].name}</strong>をちょい足しすると、うちの子の魅力がさらに引き立ちます✨ バランスカラーに<strong>${compat[1].name}</strong>を加えると洗練されたインテリアに。</p>
      </div>

      <button class="retry-btn" onclick="resetApp()">🔄 もう一度診断する</button>
      <p class="share-hint">結果をスクリーンショットしてSNSでシェアしてね🐰</p>
    </div>`;
}

function nextStep() {
  state.step++;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetApp() {
  state = { step: 0, breed: null, coat: null, gender: null, personalities: [] };
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 初期化
render();
</script>
</body>
</html>
